<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice AI Streaming Trainer</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="topbar">
          <div>
            <p class="eyebrow">Backend interview trainer</p>
            <h1>Voice AI Streaming</h1>
          </div>
          <span id="status" class="status">Conectando...</span>
        </div>

        <div id="timeline" class="timeline" aria-live="polite"></div>

        <div class="composer">
          <button id="recordButton" class="record" type="button">Grabar</button>
          <form id="textForm" class="text-form">
            <input id="textInput" type="text" placeholder="O escribi una pregunta tecnica..." autocomplete="off" />
            <button type="submit">Enviar</button>
          </form>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
