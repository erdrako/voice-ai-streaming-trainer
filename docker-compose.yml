services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - ollama
      - stt
      - tts
      - redis
    volumes:
      - app-data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 4G

  stt:
    build:
      context: ./services/stt
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
    ports:
      - "9001:9001"
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          memory: 2G

  tts:
    build:
      context: ./services/tts
    environment:
      PIPER_MODEL: /voices/es_ES-sharvard-medium.onnx
    ports:
      - "9002:9002"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  ollama:
  hf-cache:
  app-data:
